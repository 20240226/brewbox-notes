name: 每日笔记生成
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: 安装依赖
        run: npm install sharp node-fetch
      - name: 生成笔记+封面
        run: node scripts/daily.js
        env:
          COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
          SURGE_LOGIN: marsolzinc@gmail.com
          SURGE_TOKEN: faeec40b76ba6d66efeda93eddbc7314
