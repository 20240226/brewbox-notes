<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Brewbox Notes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #eee; --muted: #8899aa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 640px; padding: 2rem 1rem; }

    .lock-screen { text-align: center; padding: 3rem 2rem; background: var(--card); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .lock-screen h1 { font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent); }
    .lock-screen p { color: var(--muted); margin-bottom: 1.5rem; }
    .lock-screen input { width: 100%; padding: 0.75rem 1rem; border: 2px solid #334; border-radius: 8px; background: #0f0f23; color: #fff; font-size: 1rem; outline: none; transition: border .2s; }
    .lock-screen input:focus { border-color: var(--accent); }
    .lock-screen button { margin-top: 1rem; padding: 0.75rem 2rem; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 1rem; cursor: pointer; transition: opacity .2s; }
    .lock-screen button:hover { opacity: 0.9; }
    .lock-screen .error { color: var(--accent); margin-top: 0.75rem; font-size: 0.9rem; }

    .note-screen { display: none; }
    .note-card { background: var(--card); border-radius: 16px; padding: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .note-card .date { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .note-card h2 { font-size: 1.5rem; color: var(--accent); margin-bottom: 1rem; }
    .note-card .content { line-height: 1.8; font-size: 1.05rem; }
    .note-card .content p { margin-bottom: 0.75rem; }
    .note-card .content strong { color: var(--accent); }
    .note-card .content em { color: var(--muted); }
    .note-card .day-label { display: inline-block; background: var(--accent); color: #fff; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 0.75rem; }
    .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .actions button { flex: 1; min-width: 120px; padding: 0.6rem 1rem; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: opacity .2s; }
    .actions button:hover { opacity: 0.85; }
    .btn-copy { background: #4361ee; color: #fff; }
    .btn-cover { background: #2ec4b6; color: #fff; }
    .btn-nav { background: #334; color: var(--text); }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .nav-bar button { background: none; border: 1px solid #334; color: var(--text); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
    .nav-bar button:hover { border-color: var(--accent); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #2ec4b6; color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .loading { text-align: center; padding: 2rem; color: var(--muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #334; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cover Gallery ── */
    .cover-gallery { background: var(--card); border-radius: 16px; padding: 1.5rem; margin-top: 1.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
    .cover-gallery h3 { color: var(--accent); font-size: 1rem; margin-bottom: 1rem; }
    .cover-gallery .main-cover { width: 100%; max-width: 340px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative; }
    .cover-gallery .main-cover img { width: 100%; display: block; }
    .cover-gallery .main-cover .cv-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(233,69,96,0.85); color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 32px; text-align: center; transition: opacity .2s; z-index: 2; }
    .cover-gallery .main-cover .cv-nav-btn:hover { opacity: 0.75; }
    .cover-gallery .main-cover .cv-nav-btn.prev { left: 8px; }
    .cover-gallery .main-cover .cv-nav-btn.next { right: 8px; }
    .cover-gallery .thumbs { display: flex; gap: 6px; justify-content: center; margin: 12px auto 0; flex-wrap: wrap; }
    .cover-gallery .thumbs .thumb { width: 48px; height: 64px; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color .2s, transform .2s, opacity .2s; opacity: 0.5; }
    .cover-gallery .thumbs .thumb.active { border-color: var(--accent); transform: scale(1.1); opacity: 1; }
    .cover-gallery .thumbs .thumb:hover { opacity: 0.85; }
    .cover-gallery .thumbs .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cover-gallery .counter { color: var(--muted); font-size: 0.8rem; margin: 8px 0 12px; }
    .cover-gallery .cv-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .cover-gallery .cv-actions button { padding: 0.5rem 1rem; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: opacity .2s; }
    .cover-gallery .cv-actions button:hover { opacity: 0.85; }
    .btn-cv-dl { background: #2ec4b6; color: #fff; }
    .btn-cv-dl-all { background: transparent; color: #2ec4b6; border: 1px solid #2ec4b6 !important; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Lock Screen -->
    <div class="lock-screen" id="lockScreen">
      <h1>☕ Brewbox Notes</h1>
      <p>Enter password to view notes</p>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off" />
      <button onclick="unlock()">Unlock</button>
      <p class="error" id="lockError"></p>
    </div>

    <!-- Loading Screen -->
    <div class="lock-screen" id="loadingScreen" style="display:none;">
      <div class="spinner"></div>
      <p>Loading notes...</p>
    </div>

    <!-- Note Screen -->
    <div class="note-screen" id="noteScreen">
      <div class="nav-bar">
        <button onclick="prevNote()">← Previous</button>
        <span id="noteCounter">1 / 1</span>
        <button onclick="nextNote()">Next →</button>
      </div>
      <div class="note-card" id="noteCard">
        <div class="date" id="noteDate"></div>
        <span class="day-label" id="noteDay"></span>
        <h2 id="noteTitle">Today's Note</h2>
        <div class="content" id="noteContent"></div>
        <div class="actions">
          <button class="btn-copy" onclick="copyText()">📋 Copy</button>
          <button class="btn-cover" onclick="generateCover()">🖼 Save Cover</button>
        </div>
      </div>

      <!-- Cover Gallery (5 covers from daily.js) -->
      <div class="cover-gallery" id="coverGallery">
        <h3>🖼️ 小红书封面图</h3>
        <div class="main-cover" id="cvMainCover">
          <button class="cv-nav-btn prev" onclick="cvPrev()">‹</button>
          <img id="cvMainImg" src="notes/cover-1.png" alt="封面" onerror="this.parentElement.style.display='none'">
          <button class="cv-nav-btn next" onclick="cvNext()">›</button>
        </div>
        <div class="counter" id="cvCounter">1 / 5</div>
        <div class="thumbs" id="cvThumbs">
          <div class="thumb active" onclick="cvShow(0)"><img src="notes/cover-1.png" alt="1" onerror="this.parentElement.style.display='none'"></div>
          <div class="thumb" onclick="cvShow(1)"><img src="notes/cover-2.png" alt="2" onerror="this.parentElement.style.display='none'"></div>
          <div class="thumb" onclick="cvShow(2)"><img src="notes/cover-3.png" alt="3" onerror="this.parentElement.style.display='none'"></div>
          <div class="thumb" onclick="cvShow(3)"><img src="notes/cover-4.png" alt="4" onerror="this.parentElement.style.display='none'"></div>
          <div class="thumb" onclick="cvShow(4)"><img src="notes/cover-5.png" alt="5" onerror="this.parentElement.style.display='none'"></div>
        </div>
        <div class="cv-actions">
          <button class="btn-cv-dl" onclick="cvDownload()">⬇ 下载当前</button>
          <button class="btn-cv-dl-all" onclick="cvDownloadAll()">⬇ 下载全部 5 张</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let notes = [];
    let currentIndex = 0;
    const PASSWORD = 'brewbox2024';

    // Cover gallery state
    let cvCurrent = 0;
    const CV_TOTAL = 5;
    const CV_NAMES = [];
    for (let i = 1; i <= CV_TOTAL; i++) CV_NAMES.push('notes/cover-' + i + '.png');

    /** Simple Markdown-to-HTML converter */
    function mdToHtml(text) {
      if (!text) return '';
      // Escape HTML entities first
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      // Bold: **text**
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic: *text*
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Inline code: `text`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Newlines to paragraphs
      const paragraphs = html.split(/\n\n+/).filter(p => p.trim());
      if (paragraphs.length > 1) {
        html = paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
      } else {
        html = html.replace(/\n/g, '<br>');
      }
      return html;
    }

    async function loadNotes() {
      try {
        // Try primary location (Vercel static /data/notes.json)
        let res = await fetch('/data/notes.json');
        if (!res.ok) throw new Error('Not found');
        notes = await res.json();
        if (!Array.isArray(notes)) throw new Error('Invalid format');
      } catch {
        try {
          // Fallback: try root data path
          const res = await fetch('/data/notes.json');
          if (!res.ok) throw new Error('Not found');
          notes = await res.json();
          if (!Array.isArray(notes)) throw new Error('Invalid format');
        } catch {
          notes = [];
        }
      }
      // Ensure we have at least one note
      if (notes.length === 0) {
        notes = [{ date: new Date().toISOString().split('T')[0], weekday: new Date().toLocaleDateString('en-US', { weekday: 'long' }), content: 'No notes yet. The daily cron will generate one.' }];
      }
      currentIndex = notes.length - 1;
    }

    function unlock() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === PASSWORD) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'block';
        // Load notes, then show
        loadNotes().then(() => {
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('noteScreen').style.display = 'block';
          showNote();
          initCoverGallery();
        }).catch(() => {
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('noteScreen').style.display = 'block';
          showNote();
          initCoverGallery();
        });
      } else {
        document.getElementById('lockError').textContent = '❌ Incorrect password';
      }
    }

    function showNote() {
      if (!notes || !notes.length) {
        document.getElementById('noteContent').innerHTML = '<p style="color:var(--muted)">No notes available.</p>';
        document.getElementById('noteCounter').textContent = '0 / 0';
        return;
      }
      const note = notes[currentIndex];
      document.getElementById('noteDate').textContent = note.date || '';
      document.getElementById('noteDay').textContent = note.weekday || '';
      document.getElementById('noteTitle').textContent = '☕ Brewbox Note';
      // Render content as HTML (Markdown → HTML)
      document.getElementById('noteContent').innerHTML = mdToHtml(note.content || '');
      document.getElementById('noteCounter').textContent = (currentIndex + 1) + ' / ' + notes.length;
    }

    function prevNote() {
      if (currentIndex > 0) { currentIndex--; showNote(); }
      else toast('Already at the earliest note');
    }

    function nextNote() {
      if (currentIndex < notes.length - 1) { currentIndex++; showNote(); }
      else toast('Already at the latest note');
    }

    async function copyText() {
      const note = notes[currentIndex];
      if (!note) return toast('❌ No note to copy');
      // Strip Markdown for clipboard plain text
      const plain = note.content
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g, '$1');
      const text = `☕ Brewbox Note (${note.date} · ${note.weekday})\n\n${plain}`;
      try {
        await navigator.clipboard.writeText(text);
        toast('✅ Copied to clipboard!');
      } catch {
        toast('❌ Failed to copy');
      }
    }

    async function generateCover() {
      const card = document.getElementById('noteCard');
      if (!card || !notes.length) return toast('❌ No note to save');
      try {
        const canvas = await html2canvas(card, {
          backgroundColor: '#16213e',
          scale: 2,
          allowTaint: false,
          useCORS: true,
          logging: false,
        });
        const link = document.createElement('a');
        link.download = `brewbox-note-${notes[currentIndex]?.date || 'today'}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        toast('✅ Cover saved as PNG!');
      } catch (err) {
        console.error('html2canvas error:', err);
        toast('❌ Failed to generate cover: ' + (err.message || 'unknown error'));
      }
    }

    /* ── Cover Gallery Functions ────────────────────────────── */

    function initCoverGallery() {
      // Hide gallery if no covers found
      const img = document.getElementById('cvMainImg');
      if (!img || img.naturalWidth === 0) {
        // Image may not have loaded yet — check after a small delay
        setTimeout(checkCovers, 500);
      }
    }

    function checkCovers() {
      const img = document.getElementById('cvMainImg');
      if (img && (img.naturalWidth === 0 || img.naturalHeight === 0)) {
        // Try to load — if still fails, hide the section
        const test = new Image();
        test.onload = () => { /* covers exist, show */ };
        test.onerror = () => {
          document.getElementById('coverGallery').style.display = 'none';
        };
        test.src = 'notes/cover-1.png?' + Date.now();
      }
    }

    function cvShow(i) {
      cvCurrent = i;
      document.getElementById('cvMainImg').src = CV_NAMES[i];
      document.getElementById('cvCounter').textContent = (i + 1) + ' / ' + CV_TOTAL;
      const thumbs = document.querySelectorAll('#cvThumbs .thumb');
      thumbs.forEach((t, idx) => t.classList.toggle('active', idx === i));
    }

    function cvPrev() { cvShow((cvCurrent - 1 + CV_TOTAL) % CV_TOTAL); }
    function cvNext() { cvShow((cvCurrent + 1) % CV_TOTAL); }

    function cvDownload() {
      const a = document.createElement('a');
      a.href = CV_NAMES[cvCurrent];
      a.download = 'brewbox-cover-' + (cvCurrent + 1) + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast('✅ 开始下载封面 ' + (cvCurrent + 1));
    }

    function cvDownloadAll() {
      for (let i = 0; i < CV_TOTAL; i++) {
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = CV_NAMES[i];
          a.download = 'brewbox-cover-' + (i + 1) + '.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        }, i * 300);
      }
      toast('✅ 开始下载全部 5 张封面');
    }

    /* ── Toast ──────────────────────────────────────────────── */

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    // Enter key on password input
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') unlock();
    });

    // Keyboard navigation for covers
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('noteScreen').style.display === 'block') {
        if (e.key === 'ArrowLeft') { e.preventDefault(); cvPrev(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); cvNext(); }
      }
    });
  </script>
</body>
</html>
